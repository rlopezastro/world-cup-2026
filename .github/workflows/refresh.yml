name: Refresh data

# Runs often but spends API requests only when a game is imminent / in play
# (see refresh_data.py): odds ~30 min before each kickoff, scores around game
# windows. Commits any changed JSON, which makes Streamlit Cloud redeploy.
on:
  schedule:
    - cron: "*/5 * * * *"       # heartbeat: odds ~30 min pre-game; scores every 5 min
                                #   through each game until the final score is locked in
    - cron: "0 13 * * *"        # 06:00 Pacific (PDT = UTC-7): full morning refresh
    - cron: "0 7 * * *"         # 00:00 Pacific (midnight PDT): full nightly catch-all
  workflow_dispatch:            # manual run; optionally force a full refresh
    inputs:
      force:
        description: "Refresh everything now (ignore the schedule gate)"
        type: boolean
        default: false

permissions:
  contents: write               # needed to commit the refreshed files

concurrency:                    # don't overlap runs
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # no pip install: fetching uses only the stdlib (urllib) via the wc2026 package

      - name: Refresh data (gated)
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        # the 06:00 + 00:00 Pacific schedules and a manual force=true do a FULL
        # refresh; the 5-min heartbeat is gated (odds ~30 min pre-game, scores in window)
        run: python refresh_data.py ${{ ((github.event_name == 'schedule' && (github.event.schedule == '0 13 * * *' || github.event.schedule == '0 7 * * *')) || (github.event_name == 'workflow_dispatch' && inputs.force)) && '--force' || '' }}

      - name: Commit if changed
        run: |
          git config user.name "wc2026-bot"
          git config user.email "actions@github.com"
          git add cache.json scorers.json betting_odds.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: scheduled refresh [skip ci]"
            git push
          fi

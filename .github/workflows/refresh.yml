name: Refresh data

# Runs often but spends API requests only when a game is imminent / in play
# (see refresh_data.py): odds ~30 min before each kickoff, scores around game
# windows. Commits any changed JSON, which makes Streamlit Cloud redeploy.
on:
  schedule:
    - cron: "*/15 * * * *"      # every 15 min (UTC); the script gates the API calls
  workflow_dispatch:            # manual run; optionally force a full refresh
    inputs:
      force:
        description: "Refresh everything now (ignore the schedule gate)"
        type: boolean
        default: false

permissions:
  contents: write               # needed to commit the refreshed files

concurrency:                    # don't overlap runs
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # no pip install: fetching uses only the stdlib (urllib) via the wc2026 package

      - name: Refresh data (gated)
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python refresh_data.py ${{ (github.event_name == 'workflow_dispatch' && inputs.force) && '--force' || '' }}

      - name: Commit if changed
        run: |
          git config user.name "wc2026-bot"
          git config user.email "actions@github.com"
          git add cache.json scorers.json betting_odds.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: scheduled refresh [skip ci]"
            git push
          fi
